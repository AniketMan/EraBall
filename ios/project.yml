name: EraBall
options:
  bundleIdPrefix: com.eraball
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SDKROOT: iphoneos
    SUPPORTED_PLATFORMS: iphoneos iphonesimulator
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait

targets:
  EraBall:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: EraBall
        excludes:
          - "**/*.md"
          - "**/graphify-out/**"
          - "**/.understand-anything/**"
    resources:
      - path: EraBall/Resources/Assets.xcassets
      - path: EraBall/Resources/players_with_stats.json
      - path: EraBall/Resources/coaches.csv
      - path: EraBall/Resources/BebasNeue-Regular.ttf
    info:
      path: EraBall/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: ERA BALL
        CFBundleVersion: "1"
        CFBundleShortVersionString: "2.0.0"
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: NO
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: YES
        GKGameCenterEnabled: YES
        UIAppFonts:
          - BebasNeue-Regular.ttf
    entitlements:
      path: EraBall/EraBall.entitlements
      properties:
        com.apple.developer.game-center: YES
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eraball.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: QAHSS958N6
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          SDKROOT: iphoneos
          SUPPORTED_PLATFORMS: iphoneos iphonesimulator
        Release:
          SDKROOT: iphoneos
          SUPPORTED_PLATFORMS: iphoneos iphonesimulator
