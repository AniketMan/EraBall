name: iOS Build & TestFlight
on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-testflight.yml'
  workflow_dispatch:

jobs:
  build-and-upload:
    name: Build & Upload to TestFlight
    runs-on: [self-hosted, macOS, arm64, xcode26]
    timeout-minutes: 90

    # All credentials are hardcoded for the self-hosted runner.
    # The .p8 key file lives at a fixed path on the DevMac runner.
    env:
      ASC_KEY_PATH: /Users/aniketbhatt/Downloads/AuthKey_8NVF76L39D.p8
      ASC_KEY_ID: 8NVF76L39D
      ASC_ISSUER_ID: 5be49bd9-0ac4-40aa-97c6-48abdc5a366b
      TEAM_ID: 5BF427L96N

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Xcode
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Install xcodegen
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v xcodegen &>/dev/null; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode project
        working-directory: ios
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          xcodegen generate
          ls -la EraBall.xcodeproj/

      - name: Set build number
        working-directory: ios
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          BUILD=$(date +%Y%m%d%H%M)
          echo "BUILD_NUMBER=$BUILD" >> $GITHUB_ENV
          # Patch CURRENT_PROJECT_VERSION in project.yml then regenerate
          sed -i '' "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: \"$BUILD\"/" project.yml
          xcodegen generate

      - name: Archive
        working-directory: ios
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          xcodebuild archive \
            -scheme EraBall \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/EraBall.xcarchive" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=${{ env.TEAM_ID }} \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ env.ASC_KEY_PATH }}" \
            -authenticationKeyID "${{ env.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ env.ASC_ISSUER_ID }}"
          ls "$RUNNER_TEMP/EraBall.xcarchive"

      - name: Write ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>${{ env.TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Export & Upload to TestFlight
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/EraBall.xcarchive" \
            -exportPath "$RUNNER_TEMP/EraBallExport" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ env.ASC_KEY_PATH }}" \
            -authenticationKeyID "${{ env.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ env.ASC_ISSUER_ID }}"
          ls -la "$RUNNER_TEMP/EraBallExport/"

      - name: Verify IPA
        run: |
          IPA=$(find "$RUNNER_TEMP/EraBallExport/" -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "ERROR: No IPA found"
            ls -la "$RUNNER_TEMP/EraBallExport/" || true
            exit 1
          fi
          echo "IPA: $IPA"
          echo "Size: $(du -sh "$IPA" | cut -f1)"
          echo "Build ${{ env.BUILD_NUMBER }} ready for TestFlight."
